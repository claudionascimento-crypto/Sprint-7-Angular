<div class="login-container">

  <div class="left">
    <img src="/img/ranger.png" alt="Ford">
  </div>

  <div class="right">

    <img src="/img/ford.png" class="logo">

    <h2>Boas vindas</h2>

    <input type="text" placeholder="Usuário" [(ngModel)]="usuario">

    <input type="password" placeholder="Senha" [(ngModel)]="senha">

    <button (click)="login()">Login</button>

    <p class="erro">{{ mensagem }}</p>

  </div>

</div>
